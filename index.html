<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>verify</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0012, #3a0d1f);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* AUDIO POPUP */
#audioScreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.audioBox {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 80%;
  max-width: 320px;
}

.audioBox h2 {
  margin: 0 0 10px;
}

.audioBox button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #e6a6b4;
  color: white;
  font-weight: bold;
}

/* MAIN CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  color: white;
  width: 85%;
  max-width: 340px;
}

.card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-top: -60px;
  border: 4px solid white;
}

.card h1 {
  margin: 15px 0 5px;
}

.card p {
  opacity: 0.8;
}

.card a {
  display: block;
  margin-top: 20px;
  padding: 14px;
  border-radius: 14px;
  background: #e6c1c9;
  color: white;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- AUDIO SCREEN -->
<div id="audioScreen">
  <div class="audioBox">
    <h2>Click to Enable Audio</h2>
    <p>enter the site with sound ♡</p>
    <button onclick="enableAudio()">enable ✧</button>
  </div>
</div>

<!-- MAIN -->
<div class="card">
  <img src="profile.png">
  <h1>ℓucıα 𝓷oırè</h1>
  <p>verify to gain access ✿</p>

  <a href="https://verify-backend-production-ba8f.up.railway.app/login">
    Verify
  </a>
</div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
function enableAudio() {
  document.getElementById("bgm").play();
  document.getElementById("audioScreen").style.display = "none";
}
</script>

</body>
</html>
