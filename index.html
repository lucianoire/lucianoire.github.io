<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ℓucıα 𝓷oırè</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0012, #3a0d1f);
  height: 100vh;
  overflow: hidden;
  color: white;
}

/* AUDIO POPUP */
#audioScreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.audioBox {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.audioBox button {
  margin-top: 10px;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: #e6a6b4;
  color: white;
  font-weight: bold;
}

/* FLOATING SYMBOLS */
.float {
  position: absolute;
  opacity: 0.25;
  animation: float 6s infinite ease-in-out;
  font-size: 20px;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}

/* CARD */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 25px;
  backdrop-filter: blur(15px);
  text-align: center;
  width: 85%;
  max-width: 340px;
}

.card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid white;
  margin-top: -60px;
}

.card h1 {
  margin: 15px 0 5px;
  text-shadow: 0 0 10px white;
}

.card p {
  opacity: 0.8;
}

.card a {
  display: block;
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: #e6c1c9;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* SUCCESS */
#successBanner {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

.successBox {
  background: #7ac79a;
  padding: 15px 25px;
  border-radius: 15px;
  font-weight: bold;
}

/* typing cursor */
#typingText::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- FLOATING SYMBOLS -->
<div class="float" style="top:10%;left:10%">✧</div>
<div class="float" style="top:20%;right:10%">♡</div>
<div class="float" style="bottom:20%;left:20%">✿</div>
<div class="float" style="bottom:10%;right:20%">✧</div>

<!-- AUDIO -->
<div id="audioScreen">
  <div class="audioBox">
    <h2>Click to Enable Audio</h2>
    <p>enter the site with sound ♡</p>
    <button onclick="enableAudio()">enable ✧</button>
  </div>
</div>

<!-- CARD -->
<div class="card">
  <img src="profile.png">
  <h1>ℓucıα 𝓷oırè</h1>
  <p>verify to gain access ✿</p>

  <a href="https://verify-backend-production-ba8f.up.railway.app/login">
    Verify
  </a>
</div>

<!-- SUCCESS -->
<div id="successBanner" class="hidden">
  <div class="successBox">
    <span id="typingText"></span>
  </div>
</div>

<audio id="bgm" loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
function enableAudio() {
  document.getElementById("bgm").play();
  document.getElementById("audioScreen").style.display = "none";
}

const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
  document.getElementById("successBanner").classList.remove("hidden");

  const text = "you are now verified! you can close this now";
  let i = 0;

  function type() {
    if (i < text.length) {
      document.getElementById("typingText").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 35);
    }
  }

  type();
}
</script>

</body>
</html>
