<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ℓucıα 𝓷oırè</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      color: white;
    }

    body {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.05), transparent 18%),
        radial-gradient(circle at 50% 78%, rgba(255, 0, 120, 0.18), transparent 28%),
        linear-gradient(180deg, #020204 0%, #09000d 22%, #220012 58%, #5a0829 100%);
    }

    .bg-blur {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.04), transparent 20%),
        radial-gradient(circle at 50% 90%, rgba(255, 90, 170, 0.14), transparent 26%);
      filter: blur(6px);
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 14px 46px;
    }

    .float {
      position: absolute;
      opacity: 0.24;
      animation: float 7s infinite ease-in-out;
      font-size: 18px;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255,255,255,0.10);
    }

    .f1 { top: 9%; left: 7%; font-size: 14px; animation-duration: 7.4s; }
    .f2 { top: 14%; right: 8%; font-size: 18px; animation-duration: 8s; }
    .f3 { top: 26%; left: 18%; font-size: 15px; animation-duration: 6.8s; }
    .f4 { top: 30%; right: 12%; font-size: 16px; animation-duration: 7.7s; }
    .f5 { top: 44%; left: 7%; font-size: 14px; animation-duration: 8.3s; }
    .f6 { top: 49%; right: 7%; font-size: 16px; animation-duration: 7.1s; }
    .f7 { bottom: 28%; left: 14%; font-size: 18px; animation-duration: 8.1s; }
    .f8 { bottom: 22%; right: 15%; font-size: 17px; animation-duration: 6.9s; }
    .f9 { bottom: 14%; left: 8%; font-size: 14px; animation-duration: 8.4s; }
    .f10 { bottom: 11%; right: 10%; font-size: 19px; animation-duration: 7.3s; }
    .f11 { top: 18%; left: 48%; font-size: 12px; animation-duration: 6.7s; }
    .f12 { bottom: 34%; right: 44%; font-size: 13px; animation-duration: 8.6s; }

    @keyframes float {
      0% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-16px) translateX(2px); }
      100% { transform: translateY(0px) translateX(0px); }
    }

    .card {
      width: 100%;
      max-width: 760px;
      position: relative;
      text-align: center;
      padding: 90px 26px 34px;
      border-radius: 34px;
      background: rgba(38, 28, 38, 0.38);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 24px 60px rgba(0,0,0,0.34),
        0 0 40px rgba(255, 130, 190, 0.10);
    }

    .avatar-wrap {
      position: absolute;
      top: -64px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: rgba(255,255,255,0.96);
      padding: 5px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.26);
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      background: #ddd;
    }

    .name {
      margin: 0;
      font-size: 3.7rem;
      line-height: 1.02;
      font-weight: 800;
      color: white;
      text-shadow:
        0 0 10px rgba(255,255,255,0.95),
        0 0 24px rgba(255,255,255,0.18),
        0 0 38px rgba(255,255,255,0.08);
    }

    .sub {
      margin: 18px 0 22px;
      font-size: 1.08rem;
      color: rgba(255,255,255,0.94);
      text-shadow: 0 0 8px rgba(255,255,255,0.08);
    }

    .note {
      margin-top: 14px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.54);
      letter-spacing: 0.6px;
      text-shadow: 0 0 10px rgba(255,255,255,0.05);
    }

    .verify-btn {
      display: block;
      width: 100%;
      max-width: 620px;
      margin: 10px auto 0;
      border: none;
      border-radius: 22px;
      padding: 24px 20px;
      font-size: 1.18rem;
      font-weight: 800;
      background: #e7c7cf;
      color: rgba(255,255,255,0.98);
      text-decoration: none;
      box-shadow:
        0 0 32px rgba(255, 210, 228, 0.56),
        0 10px 26px rgba(0,0,0,0.22);
    }

    .audio-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,0.34);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .audio-box {
      width: 100%;
      max-width: 700px;
      background: rgba(28, 25, 30, 0.60);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 30px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.34);
    }

    .audio-box h2 {
      margin: 0 0 10px;
      font-size: 3rem;
      line-height: 1.05;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 14px rgba(255,255,255,0.18);
    }

    .audio-box p {
      margin: 0 0 24px;
      font-size: 1.05rem;
      color: rgba(255,255,255,0.92);
    }

    .enable-btn {
      border: none;
      border-radius: 20px;
      padding: 18px 42px;
      font-size: 1.15rem;
      font-weight: 800;
      color: white;
      background: #eb9fc0;
      cursor: pointer;
      box-shadow: 0 0 26px rgba(235,159,192,0.78);
    }

    #successBanner {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      width: calc(100% - 26px);
      max-width: 820px;
      display: none;
    }

    .successBox {
      background: #79c89d;
      color: white;
      border-radius: 22px;
      padding: 22px 26px;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      font-size: 1.1rem;
      min-height: 82px;
      display: flex;
      align-items: center;
    }

    #typingText::after {
      content: "|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    @media (max-width: 640px) {
      .audio-box h2 {
        font-size: 2.2rem;
      }

      .name {
        font-size: 2.9rem;
      }

      .card {
        padding: 82px 18px 24px;
      }

      .verify-btn {
        padding: 20px 16px;
        font-size: 1.05rem;
      }

      .successBox {
        font-size: 1rem;
        padding: 18px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blur"></div>

  <div class="float f1">✧</div>
  <div class="float f2">♡</div>
  <div class="float f3">✿</div>
  <div class="float f4">⋆</div>
  <div class="float f5">♡</div>
  <div class="float f6">✧</div>
  <div class="float f7">✿</div>
  <div class="float f8">⋆</div>
  <div class="float f9">♡</div>
  <div class="float f10">✧</div>
  <div class="float f11">✿</div>
  <div class="float f12">⋆</div>

  <div id="successBanner">
    <div class="successBox">
      <span id="typingText"></span>
    </div>
  </div>

  <div id="audioScreen" class="audio-overlay">
    <div class="audio-box">
      <h2>Click to Enable Audio</h2>
      <p>enter the site with sound ♡</p>
      <button class="enable-btn" onclick="enableAudio()">enable ✧</button>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <div class="avatar-wrap">
        <img class="avatar" src="IMG_0131.png" alt="profile">
      </div>

      <h1 class="name">ℓucıα 𝓷oırè</h1>
      <p class="sub">verify to gain access ✿</p>

      <a class="verify-btn" href="https://verify-backend-production-ba8f.up.railway.app/login">
        Verify
      </a>

      <div class="note">xoxo, lucia 💋</div>
    </div>
  </div>

  <audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    function enableAudio() {
      const audio = document.getElementById("bgm");
      audio.play().catch(() => {});
      document.getElementById("audioScreen").style.display = "none";
    }

    const params = new URLSearchParams(window.location.search);

    if (params.get("success") === "true") {
      const banner = document.getElementById("successBanner");
      const typing = document.getElementById("typingText");
      const text = "you are now verified! you can close this now";
      let i = 0;

      banner.style.display = "block";

      function typeText() {
        if (i < text.length) {
          typing.textContent += text.charAt(i);
          i++;
          setTimeout(typeText, 32);
        }
      }

      typeText();
    }
  </script>
</body>
</html>
